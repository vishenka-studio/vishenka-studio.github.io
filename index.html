<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vishenka Studio | AI & Prompts</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-base: #070303; 
            /* Фирменные цвета, снятые с фото */
            --cherry-bright: #b80d22;
            --cherry-dark: #5e020e;
            --text-main: #ffffff;
            --text-muted: #d1d1d1;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-base);
            font-family: 'Montserrat', sans-serif;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            /* Легкое бордовое свечение на фоне */
            background-image: radial-gradient(circle at 50% 0%, rgba(184, 13, 34, 0.15) 0%, transparent 70%);
        }

        /* КОНТЕЙНЕР ДЛЯ ПАДАЮЩИХ ВИШЕН */
        .cherry-snow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Чтобы вишни не мешали нажимать на кнопки */
            z-index: 1;
            overflow: hidden;
        }

        .cherry {
            position: absolute;
            top: -10%;
            font-size: 22px;
            filter: drop-shadow(0 0 5px rgba(184, 13, 34, 0.5));
            animation: fall linear infinite, sway 3s ease-in-out infinite alternate;
        }

        /* Настройка каждой вишенки (позиция, скорость падения, задержка) */
        .cherry:nth-child(1) { left: 10%; animation-duration: 12s; animation-delay: 0s; }
        .cherry:nth-child(2) { left: 25%; animation-duration: 15s; animation-delay: 4s; font-size: 18px; }
        .cherry:nth-child(3) { left: 40%; animation-duration: 10s; animation-delay: 2s; font-size: 26px; }
        .cherry:nth-child(4) { left: 60%; animation-duration: 14s; animation-delay: 1s; }
        .cherry:nth-child(5) { left: 75%; animation-duration: 11s; animation-delay: 5s; font-size: 20px; }
        .cherry:nth-child(6) { left: 90%; animation-duration: 13s; animation-delay: 3s; }

        @keyframes fall {
            to { top: 110%; }
        }

        @keyframes sway {
            from { transform: translateX(-20px) rotate(-15deg); }
            to { transform: translateX(20px) rotate(15deg); }
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 50px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        /* АВАТАР */
        .avatar-complex {
            position: relative;
            width: 160px;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .avatar-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background-image: url('avatar.jpg');
            background-size: cover;
            background-position: center;
            border: 2px solid rgba(255,255,255,0.15);
            box-shadow: 0 10px 30px rgba(184, 13, 34, 0.5);
            z-index: 10;
        }

        /* Свечение вокруг аватара */
        .ring-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(184, 13, 34, 0.25) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: 1px;
            color: var(--text-main);
            text-align: center;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 40px;
            text-align: center;
            font-weight: 400;
            line-height: 1.4;
        }

        /* КНОПКИ (Вишневый градиент) */
        .btn-stack {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn {
            position: relative;
            display: flex;
            align-items: center;
            padding: 18px 20px;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-main);
            
            /* Фирменный вишневый фон кнопок */
            background: linear-gradient(135deg, var(--cherry-bright) 0%, var(--cherry-dark) 100%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4), inset 0 2px 10px rgba(255, 255, 255, 0.1);
            
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.15);
            box-shadow: 0 12px 25px rgba(184, 13, 34, 0.4), inset 0 2px 10px rgba(255, 255, 255, 0.2);
        }

        .btn-text {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.3;
            width: 100%;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* Иконка ТГ */
        .icon-box {
            position: absolute;
            left: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tg-svg {
            width: 18px;
            height: 18px;
            fill: #fff;
        }
    </style>
</head>
