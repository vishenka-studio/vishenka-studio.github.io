<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vishenka Studio | AI & Prompts</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #070303; 
            font-family: 'Montserrat', sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 0%, rgba(184, 13, 34, 0.2) 0%, transparent 70%);
        }

        /* 🍒 УСИЛЕННЫЙ ВИШНЕПАД (12 активных потоков) */
        .cherry-snow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999; 
            overflow: hidden;
        }

        .cherry {
            position: absolute;
            top: -10%;
            filter: drop-shadow(0 0 6px rgba(184, 13, 34, 0.7));
            animation: fall linear infinite, sway 3s ease-in-out infinite alternate;
        }

        /* Тонкая настройка плотности, траектории и таймингов */
        .cherry:nth-child(1) { left: 5%; animation-duration: 8s; animation-delay: 0s; font-size: 24px; }
        .cherry:nth-child(2) { left: 15%; animation-duration: 12s; animation-delay: 3s; font-size: 18px; }
        .cherry:nth-child(3) { left: 25%; animation-duration: 10s; animation-delay: 1s; font-size: 28px; }
        .cherry:nth-child(4) { left: 35%; animation-duration: 14s; animation-delay: 5s; font-size: 20px; }
        .cherry:nth-child(5) { left: 45%; animation-duration: 9s; animation-delay: 2s; font-size: 26px; }
        .cherry:nth-child(6) { left: 55%; animation-duration: 11s; animation-delay: 4s; font-size: 22px; }
        .cherry:nth-child(7) { left: 65%; animation-duration: 13s; animation-delay: 0.5s; font-size: 25px; }
        .cherry:nth-child(8) { left: 75%; animation-duration: 15s; animation-delay: 6s; font-size: 19px; }
        .cherry:nth-child(9) { left: 85%; animation-duration: 10s; animation-delay: 2.5s; font-size: 27px; }
        .cherry:nth-child(10) { left: 92%; animation-duration: 12s; animation-delay: 1.5s; font-size: 21px; }
        .cherry:nth-child(11) { left: 20%; animation-duration: 11s; animation-delay: 7s; font-size: 23px; }
        .cherry:nth-child(12) { left: 80%; animation-duration: 13s; animation-delay: 4.5s; font-size: 24px; }

        @keyframes fall {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        @keyframes sway {
            0% { transform: translateX(-20px) rotate(-15deg); }
            100% { transform: translateX(20px) rotate(15deg); }
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 50px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .avatar-complex {
            position: relative;
            width: 160px;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .avatar-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background-image: url('avatar.jpg');
            background-size: cover;
            background-position: center;
            border: 2px solid rgba(255,255,255,0.15);
            box-shadow: 0 10px 30px rgba(184, 13, 34, 0.5);
            z-index: 10;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: 1px;
            color: #ffffff;
            text-align: center;
        }

        .subtitle {
            font-size: 14px;
            color: #d1d1d1;
            margin-bottom: 40px;
            text-align: center;
            font-weight: 400;
            line-height: 1.4;
        }

        .btn-stack {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn {
            position: relative;
            display: flex;
            align-items: center;
            padding: 18px 20px;
            border-radius: 16px;
            text-decoration: none;
            color: #ffffff;
            background: linear-gradient(135deg, #b80d22 0%, #5e020e 100%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5), inset 0 2px 10px rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.15);
            box-shadow: 0 12px 25px rgba(184, 13, 34, 0.4), inset 0 2px 10px rgba(255, 255, 255, 0.2);
        }

        .btn-text {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.3;
            width: 100%;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }

        .icon-box {
            position: absolute;
            left: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .tg-svg {
            width: 18px;
            height: 18px;
            fill: #fff;
        }
    </style>
</head>
